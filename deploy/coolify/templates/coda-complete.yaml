# documentation: https://github.com/kinetik-gg/coda/blob/main/docs/coolify.md
# slogan: Coda with bundled PostgreSQL and MinIO object storage, wired end-to-end.
# category: productivity
# tags: screenwriting, screenplay, film, production, self-hosted, all-in-one
# port: 3000
# minversion: 4.0.0-beta.411
#
# Coda one-click service template (complete/bundled fallback).
#
# Paste this file into Coolify's "Docker Compose" service editor. Coolify generates
# every credential from the SERVICE_* magic variables below and wires PostgreSQL and
# MinIO to Coda automatically. You assign two domains: one to `coda` (the app) and one
# to `minio` (the browser-facing S3 API used for signed object URLs). Everything else,
# including database and object-storage credentials, is generated and reused
# consistently across the stack.
#
# This template relies on Coolify's documented `exclude_from_hc` extension for the
# one-shot `minio-permissions` and `minio-init` services. Do not enable Raw Compose.
#
# Image: pinned to an immutable release version tag for readability. For the hardened
# supply-chain path, replace the tag with the matching
# ghcr.io/kinetik-gg/coda@sha256:... manifest digest from the same release (see
# docs/coolify.md, "Pin the release image").
services:
  postgres:
    image: postgres:17.7-alpine@sha256:bb377b7239d2774ac8cc76f481596ce96c5a6b5e9d141f6d0a0ee371a6e7c0f2
    user: postgres
    restart: unless-stopped
    mem_limit: 1g
    memswap_limit: 1280m
    pids_limit: 192
    environment:
      - POSTGRES_DB=coda
      - POSTGRES_USER=coda
      - POSTGRES_PASSWORD=$SERVICE_PASSWORD_POSTGRES
    expose:
      - '5432'
    healthcheck:
      test: [CMD-SHELL, pg_isready -U coda -d coda]
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio-permissions:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z@sha256:d249d1fb6966de4d8ad26c04754b545205ff15a62e4fd19ebd0f26fa5baacbc0
    user: '0:0'
    entrypoint:
      - /bin/sh
      - -ec
      - |
        marker=/data/.coda-owner-v1
        expected=1000:1000:v1
        current="$(cat "$$marker" 2>/dev/null || true)"
        data_owner="$(stat -c '%u:%g' /data)"
        marker_owner="$(stat -c '%u:%g' "$$marker" 2>/dev/null || true)"
        if [ "$${MINIO_FORCE_OWNERSHIP_REPAIR:-0}" != 1 ] &&
           [ "$$current" = "$$expected" ] &&
           [ "$$data_owner" = 1000:1000 ] &&
           [ "$$marker_owner" = 1000:1000 ]; then
          exit 0
        fi
        chown 0:0 /data
        rm -f "$$marker" "$$marker.tmp"
        chown -R 1000:1000 /data
        chown 0:0 /data
        printf '%s\n' "$$expected" > "$$marker.tmp"
        chown 1000:1000 "$$marker.tmp"
        mv -f "$$marker.tmp" "$$marker"
        chown 1000:1000 /data
    restart: 'no'
    exclude_from_hc: true
    read_only: true
    environment:
      - MINIO_FORCE_OWNERSHIP_REPAIR=${MINIO_FORCE_OWNERSHIP_REPAIR:-0}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    volumes:
      - minio-data:/data

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z@sha256:d249d1fb6966de4d8ad26c04754b545205ff15a62e4fd19ebd0f26fa5baacbc0
    user: '1000:1000'
    command: server /data --address :9000 --console-address 127.0.0.1:9001
    restart: unless-stopped
    mem_limit: 1536m
    memswap_limit: 2048m
    pids_limit: 128
    environment:
      # Assign the public S3 API domain to this service; SERVICE_FQDN_MINIO carries it
      # and drives the port-9000 proxy route and the browser-facing S3 endpoint.
      - SERVICE_FQDN_MINIO_9000
      - MINIO_ROOT_USER=$SERVICE_USER_MINIO
      - MINIO_ROOT_PASSWORD=$SERVICE_PASSWORD_MINIO
      - MINIO_API_CORS_ALLOW_ORIGIN=https://$SERVICE_FQDN_CODA
    expose:
      - '9000'
    healthcheck:
      test: [CMD-SHELL, 'curl -fsS http://127.0.0.1:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      minio-permissions:
        condition: service_completed_successfully
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z@sha256:fb8f773eac8ef9d6da0486d5dec2f42f219358bcb8de579d1623d518c9ebd4cc
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set coda http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "coda/$${S3_BUCKET}"
        cat > /tmp/coda-policy.json <<EOF
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": ["s3:GetBucketLocation", "s3:ListBucket", "s3:ListBucketMultipartUploads"],
              "Resource": ["arn:aws:s3:::$${S3_BUCKET}"]
            },
            {
              "Effect": "Allow",
              "Action": ["s3:AbortMultipartUpload", "s3:DeleteObject", "s3:GetObject", "s3:ListMultipartUploadParts", "s3:PutObject"],
              "Resource": ["arn:aws:s3:::$${S3_BUCKET}/*"]
            }
          ]
        }
        EOF
        mc admin policy create coda coda-app /tmp/coda-policy.json
        mc admin user add coda "$${S3_ACCESS_KEY}" "$${S3_SECRET_KEY}"
        mc admin policy attach coda coda-app --user "$${S3_ACCESS_KEY}"
    restart: 'no'
    exclude_from_hc: true
    environment:
      - MC_CONFIG_DIR=/tmp/.mc
      - MINIO_ROOT_USER=$SERVICE_USER_MINIO
      - MINIO_ROOT_PASSWORD=$SERVICE_PASSWORD_MINIO
      - S3_BUCKET=${S3_BUCKET:-coda}
      - S3_ACCESS_KEY=$SERVICE_USER_CODAS3
      - S3_SECRET_KEY=$SERVICE_PASSWORD_CODAS3
    depends_on:
      minio:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  coda:
    image: 'ghcr.io/kinetik-gg/coda:0.0.4'
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2560m
    pids_limit: 128
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=512m,mode=1777
    environment:
      # Fixed runtime contract.
      - NODE_ENV=production
      - PORT=3000
      # Domain: assign your Coda domain to this service; SERVICE_FQDN_CODA carries it
      # and drives the port-3000 proxy route and APP_ORIGIN automatically.
      - SERVICE_FQDN_CODA_3000
      - APP_ORIGIN=https://$SERVICE_FQDN_CODA
      # Canonical auto proxy trust: no manual CIDR required.
      - TRUSTED_PROXY_CIDRS=auto
      # Wired to the bundled PostgreSQL with a generated, reused password.
      - DATABASE_URL=postgresql://coda:$SERVICE_PASSWORD_POSTGRES@postgres:5432/coda?schema=public
      # Wired to the bundled MinIO. S3_ENDPOINT is the in-cluster API; S3_PUBLIC_ENDPOINT
      # is the browser-facing S3 domain assigned to the `minio` service.
      - S3_ENDPOINT=http://minio:9000
      - S3_PUBLIC_ENDPOINT=https://$SERVICE_FQDN_MINIO
      - S3_REGION=us-east-1
      - S3_BUCKET=${S3_BUCKET:-coda}
      - S3_ACCESS_KEY=$SERVICE_USER_CODAS3
      - S3_SECRET_KEY=$SERVICE_PASSWORD_CODAS3
      - S3_FORCE_PATH_STYLE=true
      # Generated secrets. SETUP_TOKEN is pre-set from a magic password variable so the
      # owner-setup token is visible in Coolify's environment editor (no log reading).
      - SETUP_TOKEN=$SERVICE_PASSWORD_64_SETUPTOKEN
      - CONFIG_ENCRYPTION_KEY=$SERVICE_BASE64_64
    expose:
      - '3000'
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: [CMD-SHELL, 'wget -q -O /dev/null http://127.0.0.1:3000/api/v1/health/ready']
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 4
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  postgres-data:
  minio-data:
