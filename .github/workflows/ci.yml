name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify workspace
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate deployment topologies
        run: pnpm deployment:validate
      - name: Validate Coolify service templates
        run: node deploy/coolify/validate-templates.cjs
      - name: Generate database client
        run: pnpm db:generate
      - name: Dependency audit
        run: pnpm audit
      - name: Formatting
        run: pnpm format:check
      - name: Quality gates
        run: pnpm quality
      - name: Type-check
        run: pnpm typecheck
      - name: Unit tests and coverage gate
        run: pnpm test:unit
      - name: Screenplay PDF fidelity gate
        run: pnpm screenplay:pdf-fidelity
      - name: Verify generated API contract
        run: pnpm openapi:check
      - name: Verify derived SQLite schema is current
        run: pnpm sqlite:schema:check
      - name: Build
        run: pnpm build

  migration-smoke:
    name: Migrate an empty database
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17.7-alpine@sha256:bb377b7239d2774ac8cc76f481596ce96c5a6b5e9d141f6d0a0ee371a6e7c0f2
        env:
          POSTGRES_DB: coda_test
          POSTGRES_USER: coda_test
          POSTGRES_PASSWORD: coda_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coda_test -d coda_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://coda_test:coda_test_password@localhost:5432/coda_test?schema=public
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply migrations
        run: pnpm db:deploy

  sqlite-portability:
    name: SQLite portability lane
    runs-on: ubuntu-24.04
    # The portability tripwire (issue #77). Nothing ships on SQLite — this lane runs the API unit
    # suite plus a curated integration-adjacent subset against a throwaway SQLite database so that a
    # PR re-introducing a Postgres-only construct outside the DatabaseCapabilities seam
    # (apps/api/src/database) fails here with an actionable message. Bounded well under the budget.
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm --filter @coda/fountain build && pnpm --filter @coda/contracts build
      - name: Generate database client
        run: pnpm db:generate
      - name: API unit suite (dialect-agnostic)
        run: pnpm --filter @coda/api test
      - name: Curated portability subset against SQLite
        run: pnpm test:sqlite

  system-tests:
    name: Integration and end-to-end tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      POSTGRES_PASSWORD: integration-postgres-password
      MINIO_ROOT_USER: integration-root
      MINIO_ROOT_PASSWORD: integration-root-password
      S3_ACCESS_KEY: integration-app
      S3_SECRET_KEY: integration-app-secret
      S3_BUCKET: coda-integration
      CODA_IMAGE: coda-test:local
      DATABASE_URL: postgresql://coda:integration-postgres-password@postgres:5432/coda?schema=public
      APP_ORIGIN: http://localhost:53000
      TRUSTED_PROXY_CIDRS: 127.0.0.1/32
      S3_PUBLIC_ENDPOINT: http://localhost:59000
      MINIO_CORS_ALLOW_ORIGIN: http://localhost:53000
      SETUP_TOKEN: integration-setup-token-2026-abcdefghi
      # Tune the account lockout threshold low so the lockout+recovery scenario stays within the
      # per-IP login throttle (5/60s). Substituted into the app container by Compose and read by the
      # integration test to drive exactly this many failures.
      AUTH_LOGIN_BACKOFF_THRESHOLD: 3
      CODA_INTEGRATION_URL: http://127.0.0.1:53000
      CODA_INTEGRATION_SETUP_TOKEN: integration-setup-token-2026-abcdefghi
      CODA_INTEGRATION_EMAIL: integration@coda.local
      CODA_INTEGRATION_PASSWORD: Meridian-Backdrop-Owner-2026
      CODA_E2E_URL: http://localhost:53000
      CODA_E2E_EMAIL: integration@coda.local
      CODA_E2E_PASSWORD: Meridian-Backdrop-Owner-2026
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start fresh full-stack production topology
        run: docker compose --project-name coda-test -f compose.yaml -f compose.test.yaml up --build --detach
      - name: Wait for readiness
        run: |
          for _ in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:53000/api/v1/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose --project-name coda-test -f compose.yaml -f compose.test.yaml logs
          exit 1
      - name: Integration tests
        run: pnpm test:integration
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: End-to-end tests
        run: pnpm test:e2e
      - name: Show container logs on failure
        if: failure()
        run: docker compose --project-name coda-test -f compose.yaml -f compose.test.yaml logs
      - name: Restart the stack on the filesystem BlobStore driver
        run: |
          docker compose --project-name coda-test -f compose.yaml -f compose.test.yaml down --volumes --remove-orphans
          docker compose --project-name coda-test -f compose.yaml -f compose.test.yaml -f compose.blob-fs.yaml up --build --detach
      - name: Wait for filesystem-driver readiness
        run: |
          for _ in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:53000/api/v1/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose --project-name coda-test -f compose.yaml -f compose.test.yaml -f compose.blob-fs.yaml logs
          exit 1
      - name: Integration tests (filesystem driver, app-proxied transfers)
        run: pnpm test:integration
      - name: Show filesystem-driver logs on failure
        if: failure()
        run: docker compose --project-name coda-test -f compose.yaml -f compose.test.yaml -f compose.blob-fs.yaml logs
      - name: Stop disposable stack
        if: always()
        run: docker compose --project-name coda-test -f compose.yaml -f compose.test.yaml down --volumes --remove-orphans
      - name: Smoke-test fresh app-only topology
        run: pnpm deployment:smoke app-only
      - name: Gate upgrade from v0.0.1
        run: pnpm deployment:smoke upgrade-v0.0.1
      - name: Prove concurrent-boot migration safety
        run: pnpm deployment:smoke concurrent-boot
      - name: Prove single-execution scheduler safety
        run: pnpm deployment:smoke concurrent-scheduler
