name: Release container

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-policy:
    name: Verify tagged release commit
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      release_sha: ${{ steps.policy.outputs.release_sha }}
      release_version: ${{ steps.policy.outputs.release_version }}
    steps:
      - name: Check out tagged revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - name: Require exact commit on main
        id: policy
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          test "$REF_TYPE" = "tag"
          package_version="$(node -p "require('./package.json').version")"
          test "$REF_NAME" = "v${package_version}"
          tag_commit="$(git rev-parse "${RELEASE_SHA}^{commit}")"
          checked_out="$(git rev-parse HEAD)"
          test "$checked_out" = "$tag_commit"
          git fetch --no-tags origin main:refs/remotes/origin/main
          test "$tag_commit" = "$(git rev-parse origin/main)"
          echo "release_sha=$tag_commit" >> "$GITHUB_OUTPUT"
          echo "release_version=$package_version" >> "$GITHUB_OUTPUT"

  verification:
    name: Full release verification
    needs: release-policy
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml
    with:
      release_sha: ${{ needs.release-policy.outputs.release_sha }}

  security:
    name: Release security verification
    needs: release-policy
    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write
    uses: ./.github/workflows/security.yml
    with:
      release_sha: ${{ needs.release-policy.outputs.release_sha }}

  recovery:
    name: Release recovery verification
    needs: release-policy
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/recovery.yml
    with:
      release_sha: ${{ needs.release-policy.outputs.release_sha }}

  publish:
    name: Publish GHCR image
    needs: [recovery, release-policy, security, verification]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      image_digest: ${{ steps.publish.outputs.digest }}
      image_name: ${{ steps.image.outputs.name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ needs.release-policy.outputs.release_sha }}
      - name: Confirm release revision
        env:
          EXPECTED_SHA: ${{ needs.release-policy.outputs.release_sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Sign in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve immutable image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: type=raw,value=candidate-${{ needs.release-policy.outputs.release_version }}
          labels: |
            org.opencontainers.image.version=${{ needs.release-policy.outputs.release_version }}
            org.opencontainers.image.revision=${{ needs.release-policy.outputs.release_sha }}
      - name: Build and publish scan candidate
        id: publish
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - name: Scan exact AMD64 release candidate
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        env:
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TRIVY_PLATFORM: linux/amd64
          TRIVY_USERNAME: ${{ github.actor }}
        with:
          image-ref: ${{ steps.image.outputs.name }}@${{ steps.publish.outputs.digest }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: trivy-amd64.json
          exit-code: '1'
      - name: Scan exact ARM64 release candidate
        if: ${{ !cancelled() }}
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        env:
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TRIVY_PLATFORM: linux/arm64
          TRIVY_USERNAME: ${{ github.actor }}
        with:
          image-ref: ${{ steps.image.outputs.name }}@${{ steps.publish.outputs.digest }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: trivy-arm64.json
          exit-code: '1'
          skip-setup-trivy: true
      - name: Retain release vulnerability evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-vulnerability-scan-${{ github.run_id }}-${{ github.run_attempt }}
          path: trivy-*.json
          if-no-files-found: error
          retention-days: 90
      - name: Check immutable version state
        id: version
        env:
          IMAGE_DIGEST: ${{ steps.publish.outputs.digest }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          RELEASE_VERSION: ${{ needs.release-policy.outputs.release_version }}
        run: |
          set -euo pipefail
          manifest_file="$(mktemp)"
          inspection_error="$(mktemp)"
          trap 'rm -f "$manifest_file" "$inspection_error"' EXIT
          version_ref="$IMAGE_NAME:$RELEASE_VERSION"

          if docker buildx imagetools inspect "$version_ref" --raw > "$manifest_file" 2> "$inspection_error"; then
            published_digest="sha256:$(sha256sum "$manifest_file" | cut -d' ' -f1)"
            if test "$published_digest" != "$IMAGE_DIGEST"; then
              echo "Version conflict: $version_ref resolves to $published_digest, not verified digest $IMAGE_DIGEST" >&2
              exit 1
            fi
            echo "promotion_needed=false" >> "$GITHUB_OUTPUT"
            echo "Existing immutable version already resolves to the verified digest."
          elif grep -Eqi 'not found|manifest unknown' "$inspection_error"; then
            echo "promotion_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Unable to inspect immutable version $version_ref" >&2
            cat "$inspection_error" >&2
            exit 1
          fi
      - name: Promote verified digest to immutable version
        if: steps.version.outputs.promotion_needed == 'true'
        env:
          IMAGE_DIGEST: ${{ steps.publish.outputs.digest }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          RELEASE_VERSION: ${{ needs.release-policy.outputs.release_version }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE_NAME:$RELEASE_VERSION" "$IMAGE_NAME@$IMAGE_DIGEST"
      - name: Verify immutable version digest
        env:
          IMAGE_DIGEST: ${{ steps.publish.outputs.digest }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          RELEASE_VERSION: ${{ needs.release-policy.outputs.release_version }}
        run: |
          published_digest="sha256:$(docker buildx imagetools inspect "$IMAGE_NAME:$RELEASE_VERSION" --raw | sha256sum | cut -d' ' -f1)"
          test "$published_digest" = "$IMAGE_DIGEST"
      - name: Attest published image
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
      - name: Record immutable release reference
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.publish.outputs.digest }}
          RELEASE_VERSION: ${{ needs.release-policy.outputs.release_version }}
        run: |
          {
            echo "## Published container"
            echo "Version tag: \`$IMAGE_NAME:$RELEASE_VERSION\`"
            echo "Immutable reference: \`$IMAGE_NAME@$IMAGE_DIGEST\`"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Publish deployment bundle
    needs: [release-policy, publish, security, verification]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Check out verified release revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ needs.release-policy.outputs.release_sha }}
      - name: Confirm release revision
        env:
          EXPECTED_SHA: ${{ needs.release-policy.outputs.release_sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build deterministic deployment bundle
        env:
          IMAGE_DIGEST: ${{ needs.publish.outputs.image_digest }}
          IMAGE_NAME: ${{ needs.publish.outputs.image_name }}
          RELEASE_VERSION: ${{ needs.release-policy.outputs.release_version }}
        run: >-
          pnpm deployment:bundle --version "$RELEASE_VERSION"
          --image "$IMAGE_NAME" --digest "$IMAGE_DIGEST" --output release-assets
      - name: Verify release checksum and archive
        working-directory: release-assets
        run: |
          sha256sum --check "coda-deployment-v${{ needs.release-policy.outputs.release_version }}.sha256"
          tar --gzip --list --file "coda-deployment-v${{ needs.release-policy.outputs.release_version }}.tar.gz"
      - name: Attest deployment archive and checksum
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            release-assets/coda-deployment-v${{ needs.release-policy.outputs.release_version }}.tar.gz
            release-assets/coda-deployment-v${{ needs.release-policy.outputs.release_version }}.sha256
      - name: Create GitHub release with verified assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.release-policy.outputs.release_version }}
        run: >-
          pnpm release:publish-assets --tag "$GITHUB_REF_NAME"
          --title "Coda v$RELEASE_VERSION" --assets release-assets
