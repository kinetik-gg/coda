name: coda

# Canonical app-only topology for externally managed PostgreSQL and S3.
# Add compose.app.local.yaml when direct localhost access is required.
services:
  coda:
    image: ${CODA_IMAGE:?Set CODA_IMAGE to an immutable attested manifest digest}
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2560m
    pids_limit: 128
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=512m,mode=1777
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_ORIGIN: ${APP_ORIGIN:?Set APP_ORIGIN}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:?Set TRUSTED_PROXY_CIDRS}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-coda_session}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      AUTH_LOGIN_BACKOFF_THRESHOLD: ${AUTH_LOGIN_BACKOFF_THRESHOLD:-5}
      AUTH_LOGIN_BACKOFF_WINDOWS_MS: ${AUTH_LOGIN_BACKOFF_WINDOWS_MS:-60000,300000,900000}
      SETUP_TOKEN: ${SETUP_TOKEN:-}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:?Set S3_ENDPOINT}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?Set S3_PUBLIC_ENDPOINT}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:?Set S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:?Set S3_FORCE_PATH_STYLE to true or false}
      PDF_MAX_BYTES: ${PDF_MAX_BYTES:-262144000}
      PDF_WORKER_MAX_OLD_GENERATION_MB: ${PDF_WORKER_MAX_OLD_GENERATION_MB:-512}
      SCREENPLAY_REQUEST_MAX_BYTES: ${SCREENPLAY_REQUEST_MAX_BYTES:-20016384}
      SCREENPLAY_BODY_MAX_CONCURRENT: ${SCREENPLAY_BODY_MAX_CONCURRENT:-4}
      SCREENPLAY_PREAUTH_WINDOW_MS: ${SCREENPLAY_PREAUTH_WINDOW_MS:-60000}
      SCREENPLAY_PREAUTH_MAX_PER_CLIENT: ${SCREENPLAY_PREAUTH_MAX_PER_CLIENT:-120}
      SCREENPLAY_PREAUTH_MAX_GLOBAL: ${SCREENPLAY_PREAUTH_MAX_GLOBAL:-1200}
      SCREENPLAY_BODY_TIMEOUT_MS: ${SCREENPLAY_BODY_TIMEOUT_MS:-30000}
      SCREENPLAY_MAX_DOCUMENTS_PER_OWNER: ${SCREENPLAY_MAX_DOCUMENTS_PER_OWNER:-250}
      SCREENPLAY_MAX_SOURCE_BYTES_PER_OWNER: ${SCREENPLAY_MAX_SOURCE_BYTES_PER_OWNER:-262144000}
      ASSET_MAX_BYTES: ${ASSET_MAX_BYTES:-2147483648}
      STORAGE_PENDING_MAX_OBJECTS: ${STORAGE_PENDING_MAX_OBJECTS:-20}
      STORAGE_PENDING_MAX_BYTES: ${STORAGE_PENDING_MAX_BYTES:-5368709120}
      STORAGE_PENDING_INSTANCE_MAX_OBJECTS: ${STORAGE_PENDING_INSTANCE_MAX_OBJECTS:-1000}
      STORAGE_PENDING_INSTANCE_MAX_BYTES: ${STORAGE_PENDING_INSTANCE_MAX_BYTES:-21474836480}
      STORAGE_UPLOAD_RETENTION_HOURS: ${STORAGE_UPLOAD_RETENTION_HOURS:-24}
      SIGNED_READ_TTL_SECONDS: ${SIGNED_READ_TTL_SECONDS:-300}
      SIGNED_UPLOAD_TTL_SECONDS: ${SIGNED_UPLOAD_TTL_SECONDS:-900}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      SCHEDULER_JOB_TIMEOUT_MS: ${SCHEDULER_JOB_TIMEOUT_MS:-300000}
      SCHEDULER_HEARTBEAT_ENABLED: ${SCHEDULER_HEARTBEAT_ENABLED:-false}
      SCHEDULER_HEARTBEAT_INTERVAL_MS: ${SCHEDULER_HEARTBEAT_INTERVAL_MS:-3600000}
      SCHEDULED_BACKUP_TICK_MS: ${SCHEDULED_BACKUP_TICK_MS:-3600000}
    expose:
      - '3000'
    healthcheck:
      test: [CMD-SHELL, 'wget -q -O /dev/null http://127.0.0.1:3000/api/v1/health/ready']
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 4
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
