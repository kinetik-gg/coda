# A second, independent MinIO backend used to prove the storage settings wizard's
# live hot-swap: switch the active backend through the API, verify it takes effect
# without a restart, and confirm it survives a container recreate. Layer this on
# top of compose.yaml and compose.test.yaml. Not part of the canonical topology.
services:
  minio2-permissions:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z@sha256:d249d1fb6966de4d8ad26c04754b545205ff15a62e4fd19ebd0f26fa5baacbc0
    user: '0:0'
    entrypoint:
      - /bin/sh
      - -ec
      - |
        chown -R 1000:1000 /data
        chown 0:0 /data
        chown 1000:1000 /data
    restart: 'no'
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    volumes:
      - minio2-data:/data

  minio2:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z@sha256:d249d1fb6966de4d8ad26c04754b545205ff15a62e4fd19ebd0f26fa5baacbc0
    user: '1000:1000'
    command: server /data --address :9000 --console-address 127.0.0.1:9001
    restart: unless-stopped
    mem_limit: 1024m
    memswap_limit: 1280m
    pids_limit: 128
    environment:
      MINIO_ROOT_USER: ${MINIO2_ROOT_USER:-integration-root-2}
      MINIO_ROOT_PASSWORD: ${MINIO2_ROOT_PASSWORD:-integration-root-password-2}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO2_CORS_ALLOW_ORIGIN:-http://localhost:53000}
    expose:
      - '9000'
    ports:
      - '127.0.0.1:${CODA_TEST_MINIO2_PORT:-59100}:9000'
    healthcheck:
      test: [CMD-SHELL, 'curl -fsS http://127.0.0.1:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      minio2-permissions:
        condition: service_completed_successfully
    volumes:
      - minio2-data:/data

  minio2-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z@sha256:fb8f773eac8ef9d6da0486d5dec2f42f219358bcb8de579d1623d518c9ebd4cc
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set coda2 http://minio2:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "coda2/$${S3_SECOND_BUCKET}"
        cat > /tmp/coda-policy.json <<EOF
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": ["s3:GetBucketLocation", "s3:ListBucket", "s3:ListBucketMultipartUploads"],
              "Resource": ["arn:aws:s3:::$${S3_SECOND_BUCKET}"]
            },
            {
              "Effect": "Allow",
              "Action": ["s3:AbortMultipartUpload", "s3:DeleteObject", "s3:GetObject", "s3:ListMultipartUploadParts", "s3:PutObject"],
              "Resource": ["arn:aws:s3:::$${S3_SECOND_BUCKET}/*"]
            }
          ]
        }
        EOF
        mc admin policy create coda2 coda-app /tmp/coda-policy.json
        mc admin user add coda2 "$${S3_SECOND_ACCESS_KEY}" "$${S3_SECOND_SECRET_KEY}"
        mc admin policy attach coda2 coda-app --user "$${S3_SECOND_ACCESS_KEY}"
    restart: 'no'
    environment:
      MC_CONFIG_DIR: /tmp/.mc
      MINIO_ROOT_USER: ${MINIO2_ROOT_USER:-integration-root-2}
      MINIO_ROOT_PASSWORD: ${MINIO2_ROOT_PASSWORD:-integration-root-password-2}
      S3_SECOND_BUCKET: ${S3_SECOND_BUCKET:-coda-second}
      S3_SECOND_ACCESS_KEY: ${S3_SECOND_ACCESS_KEY:-integration-app-2}
      S3_SECOND_SECRET_KEY: ${S3_SECOND_SECRET_KEY:-integration-app-2-secret}
    depends_on:
      minio2:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  coda:
    depends_on:
      minio2-init:
        condition: service_completed_successfully

volumes:
  minio2-data:
