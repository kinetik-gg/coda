name: Recovery

on:
  workflow_call:
    inputs:
      release_sha:
        description: Exact release commit to verify
        required: false
        type: string
  pull_request:
    paths:
      - '.github/workflows/recovery.yml'
      - 'apps/api/prisma/**'
      - 'compose*.yaml'
      - 'Dockerfile'
      - 'ops/container-entrypoint.sh'
      - 'scripts/ops/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/recovery.yml'
      - 'apps/api/prisma/**'
      - 'compose*.yaml'
      - 'Dockerfile'
      - 'ops/container-entrypoint.sh'
      - 'scripts/ops/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: recovery-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lifecycle:
    name: Restore, upgrade, and rollback
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ inputs.release_sha || github.sha }}
      - name: Confirm release revision
        if: inputs.release_sha != ''
        env:
          EXPECTED_SHA: ${{ inputs.release_sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test recovery guardrails
        run: pnpm exec vitest run scripts/ops/recovery-core.test.ts
      - name: Start isolated candidate registry
        run: >-
          docker run --detach --name coda-recovery-registry
          --publish 127.0.0.1:5000:5000
          registry:2.8.3@sha256:a3d8aaa63ed8681a604f1dea0aa03f100d5895b6a58ace528858a7b332415373
      - name: Build candidate image
        run: docker build --tag 127.0.0.1:5000/coda:candidate .
      - name: Publish candidate to isolated registry
        run: |
          docker push 127.0.0.1:5000/coda:candidate
          docker pull 127.0.0.1:5000/coda:candidate
      - name: Resolve immutable candidate reference
        id: candidate
        shell: bash
        run: |
          image=$(docker image inspect 127.0.0.1:5000/coda:candidate --format '{{index .RepoDigests 0}}')
          [[ "$image" =~ ^127\.0\.0\.1:5000/coda@sha256:[a-f0-9]{64}$ ]]
          docker pull "$image"
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - name: Validate recovery lifecycle
        env:
          CODA_RECOVERY_CANDIDATE_IMAGE: ${{ steps.candidate.outputs.image }}
          CODA_RECOVERY_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: sh scripts/ops/validate-recovery-lifecycle.sh
      - name: Retain dated recovery evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: recovery-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/recovery-*
          if-no-files-found: error
          retention-days: 30
